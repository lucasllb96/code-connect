services:
  postgres:
    image: postgres:17-alpine
    container_name: codeconnect-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: codeconnect
      POSTGRES_PASSWORD: codeconnect
      POSTGRES_DB: codeconnect
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
